name: Release
on:
  workflow_dispatch:
    inputs:
      llamacpp_version:
        required: false
        default: ''
        type: string
      write_latest:
        required: false
        default: true
        type: boolean
  schedule:
    - cron: 0 0 * * 6
jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      llamacpp_version: ${{ steps.tags.outputs.llamacpp_version }}
      boringssl_version: ${{ steps.tags.outputs.boringssl_version }}
      write_latest: ${{ steps.tags.outputs.write_latest }}
    steps:
      - name: Get tags
        id: tags
        run: |
          if [ "${{ inputs.llamacpp_version }}" ]
          then LLAMACPP_VERSION="${{ inputs.llamacpp_version }}"
          else LLAMACPP_VERSION=$(git ls-remote --tags https://github.com/ggml-org/llama.cpp | sed -nE 's,.*/tags/(b[0-9]+)$,\1,p' | sort -V | tail -n 1)
          fi
          BORINGSSL_VERSION=$(git ls-remote --tags https://boringssl.googlesource.com/boringssl | sed -nE 's,.*/tags/(0\.[0-9]+\.0)$,\1,p' | sort | tail -n 1)
          if [ "${{ github.event_name }}" = "schedule" ]
          then WRITE_LATEST="true"
          else WRITE_LATEST="${{ inputs.write_latest }}"
          fi
          cat <<EOF >> "$GITHUB_OUTPUT"
          llamacpp_version=$LLAMACPP_VERSION
          boringssl_version=$BORINGSSL_VERSION
          write_latest=$WRITE_LATEST
          EOF
          grep _version= "$GITHUB_OUTPUT"

