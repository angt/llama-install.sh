name: Build cuda deps

on:
  workflow_call:
    inputs: &common_inputs
      cuda_code:
        type: string
        default: '128'
      deploy:
        type: boolean
      llamacpp_version:
        type: string
  workflow_dispatch:
    inputs: *common_inputs

jobs:
  deps:
    runs-on: windows-2022
    env:
      CUDA_VERSION_128: "12.8.2"
      CUDA_VERSION_129: "12.9.2"
    steps:
      - uses: actions/checkout@v5

      - name: Select CUDA version
        shell: bash
        run: echo "CUDA_VERSION=${CUDA_VERSION_${{ inputs.cuda_code }}}" >> "$GITHUB_ENV"

      - name: Install CUDA
        run: python scripts/install-cuda.py

      - name: Stage CUDA runtime DLLs
        shell: bash
        run: |
          out="output/x86_64/windows/cuda/deps/${{ inputs.cuda_code }}"
          mkdir -p "$out"
          for dll in cublas64_12.dll cublasLt64_12.dll; do
            src="deps/cuda/bin/$dll"
            test -f "$src" || { echo "missing CUDA runtime DLL: $src" >&2; exit 1; }
            zstd -f -19 "$src" -o "$out/$dll.zst"
            echo "staged $dll -> deps/${{ inputs.cuda_code }}/$dll.zst"
          done

      - name: Deploy
        if: ${{ inputs.deploy && vars.HF_REPO != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U "hf[hf_xet]"
          python scripts/upload.py ${{ vars.HF_REPO }}/${{ inputs.llamacpp_version || 'test' }}
