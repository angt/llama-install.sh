name: Build any vulkan

on:
  workflow_call:
    inputs: &common_inputs
      filter:
        type: string
        default: 'vulkan'
      deploy:
        type: boolean
      llamacpp_repo:
        type: string
      llamacpp_version:
        type: string
      boringssl_repo:
        type: string
      boringssl_version:
        type: string

  workflow_dispatch:
    inputs: *common_inputs

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: "0.17.0-dev.1387+01b60634c"
      VULKAN_VERSION: "1.4.350.1"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Zig
        run: python scripts/install-zig.py

      - name: Setup Vulkan
        run: |
          VULKAN="vulkansdk-linux-$(uname -m)-$VULKAN_VERSION"
          curl -sSf "https://sdk.lunarg.com/sdk/download/$VULKAN_VERSION/linux/$VULKAN.tar.xz" | tar -Jxf- -C ~
          sudo mv ~/"$VULKAN_VERSION/$(uname -m)" /opt/vulkan-sdk

      - name: Build ${{ inputs.filter }}
        env:
          LLAMACPP_REPO: ${{ inputs.llamacpp_repo }}
          LLAMACPP_VERSION: ${{ inputs.llamacpp_version }}
          BORINGSSL_REPO: ${{ inputs.boringssl_repo }}
          BORINGSSL_VERSION: ${{ inputs.boringssl_version }}
          HF_TOKEN: ${{ secrets.HF_TOKEN_READ }}
        run: cmake --workflow --preset ${{ inputs.filter }}

      - name: Deploy
        if: ${{ inputs.deploy && vars.HF_REPO != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -U "hf[hf_xet]"
          python scripts/upload.py ${{ vars.HF_REPO }}/${{ inputs.llamacpp_version || 'test' }}
