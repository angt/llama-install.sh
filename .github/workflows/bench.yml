name: Bench

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        default: ''
        type: string

jobs:
  bench:
    name: ${{ matrix.backend }}:${{ matrix.model }}:${{ matrix.quant }}
    runs-on: [self-hosted, "${{ matrix.backend }}"]
    strategy:
      fail-fast: false
      matrix:
        backend:
          - gfx1151
        model:
          - unsloth/Qwen3.5-0.8B-GGUF
          - unsloth/Qwen3.6-27B-GGUF
          - unsloth/gpt-oss-20b-GGUF
          - unsloth/gemma-4-26B-A4B-it-GGUF
          - unsloth/gemma-4-E4B-it-GGUF
        quant:
          - Q3_K_S
          - Q3_K_M
          - Q4_0
          - Q4_1
          - Q4_K_S
          - Q4_K_M
          - Q5_K_S
          - Q5_K_M
          - Q6_K
          - Q8_0
          - BF16
    steps:
      - uses: actions/checkout@v5

      - name: Bench
        env:
          LLAMA_BUCKET: ${{ vars.HF_REPO }}
          LLAMA_VERSION: ${{ inputs.version }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          SKIP_INSTALL=1 sh install.sh
          MODEL=${{ matrix.model }}
          NAME="${MODEL%-GGUF}"
          NAME="${NAME#*/}"
          BACKEND=${{ matrix.backend }}
          rm -rf output
          mkdir -p "output/${BACKEND}/${NAME}"
          ~/.llama-app/llama bench -fa 0,1 -hf "${MODEL}:${{ matrix.quant }}" -o jsonl -r 10 > "output/${BACKEND}/${NAME}/${{ matrix.quant }}.jsonl"

      - name: Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_BENCHES }}
        run: |
          VERSION=$(~/.llama-app/llama version)
          pip install -U "hf[hf_xet]" ||:
          python3 scripts/upload.py ${{ vars.HF_REPO_BENCHES }}/${VERSION}
