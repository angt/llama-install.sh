name: Bench

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        default: ''
        type: string

jobs:
  bench:
    name: ${{ matrix.backend }}:${{ matrix.model }}:${{ matrix.quant }}
    runs-on: [self-hosted, "${{ matrix.backend }}"]
    strategy:
      fail-fast: false
      matrix:
        backend:
          - gfx1151
        model:
          - unsloth/Qwen3.5-0.8B-GGUF
          - unsloth/Qwen3.6-27B-GGUF
          - unsloth/gpt-oss-20b-GGUF
          - unsloth/gemma-4-26B-A4B-it-GGUF
          - unsloth/gemma-4-E4B-it-GGUF
        quant:
          - Q3_K_S
          - Q3_K_M
          - Q4_0
          - Q4_1
          - Q4_K_S
          - Q4_K_M
          - Q5_K_S
          - Q5_K_M
          - Q6_K
          - Q8_0
          - BF16
    steps:
      - uses: actions/checkout@v5

      - name: Install
        env:
          LLAMA_BUCKET: ${{ vars.HF_REPO }}
          LLAMA_VERSION: ${{ inputs.version }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: SKIP_INSTALL=1 sh install.sh

      - name: Check model
        id: check
        env:
          MODEL: ${{ matrix.model }}
          QUANT: ${{ matrix.quant }}
        run: |
          if ~/.llama-app/llama download --offline -hf "$MODEL:$QUANT" 1>/dev/null
          then echo "present=true"
          else echo "present=false"
          fi >> "$GITHUB_OUTPUT"

      - name: Bench
        if: steps.check.outputs.present == 'true'
        env:
          MODEL: ${{ matrix.model }}
          BACKEND: ${{ matrix.backend }}
          QUANT: ${{ matrix.quant }}
        run: |
          NAME="$MODEL"
          NAME="${NAME%-GGUF}"
          NAME="${NAME#*/}"
          rm -rf output
          mkdir -p "output/$BACKEND/$NAME"
          ~/.llama-app/llama bench --offline -v -fa 0,1 -hf "$MODEL:$QUANT" -o jsonl -r 10 > "output/$BACKEND/$NAME/$QUANT.jsonl"

      - name: Push
        if: steps.check.outputs.present == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_BENCHES }}
          REPO: ${{ vars.HF_REPO_BENCHES }}
        run: |
          VERSION=$(~/.llama-app/llama version)
          pip install -U "hf[hf_xet]" ||:
          python3 scripts/upload.py "$REPO/$VERSION"
